<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form</title>
  <style>

  </style>
</head>
<body>
  <form>
    <h2>Life Form</h2>
    <br />

    <label for="name">Name</label><br />
    <input type="text" id="name" name="name" placeholder="Enter your name" /><br /><br />

    <label for="email">Email</label><br />
    <input type="email" id="email" name="email" placeholder="you@example.com" /><br /><br />

    <label for="phone">Phone</label><br />
    <input type="tel" id="phone" name="phone" placeholder="123-456-7890" /><br /><br />

    <label for="website">Website</label><br />
    <input type="url" id="website" name="website" placeholder="https://example.com" /><br /><br />

    <label for="password">Password</label><br />
    <input type="password" id="password" name="password" /><br /><br />

    <label for="age">Age</label><br />
    <input type="number" id="age" name="age" min="1" max="100" /><br /><br />

    <label for="dob">Date of Birth</label><br />
    <input type="date" id="dob" name="dob" /><br /><br />

    <label for="favorite-color">Favorite Color</label><br />
    <input type="color" id="favorite-color" name="favorite-color" /><br /><br />

    <label for="search">Search</label><br />
    <input type="search" id="search" name="search" placeholder="Search here" /><br /><br />

    <label for="file">Upload File</label><br />
    <input type="file" id="file" name="file" /><br /><br />

    <label for="range">Experience level</label><br />
    <input type="range" id="range" name="range" min="1" max="10" /><br /><br />

    <label>Preferred Contact</label><br />
    <label><input type="radio" name="contact" value="email" /> Email</label><br />
    <label><input type="radio" name="contact" value="phone" /> Phone</label><br /><br />

    <label>Interests</label><br />
    <label><input type="checkbox" name="hobbies" value="Swimming" /> Swimming</label><br />
    <label><input type="checkbox" name="hobbies" value="Track and Field" /> Track and Field</label><br />
    <label><input type="checkbox" name="hobbies" value="football" /> football</label><br />
    <label><input type="checkbox" name="hobbies" value="Basketball" /> Basketball</label><br /><br />

    <input type="button" value="Click Me" />
    <input type="submit" value="Submit" />
    <input type="reset" value="Reset" />
  </form>
</body>
</html>
